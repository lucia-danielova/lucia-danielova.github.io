  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; }
    
    .app-wrapper {
      height: 100%; width: 100%; position: relative;
      background-image: url('podklad.png');
      background-size: cover; background-position: center; background-repeat: no-repeat;
      display: flex; flex-direction: column;
    }
    
    /* VRSTVA PRE ZRUČNOSTI (LISTY) */
    .skills-flow-container { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    .skill-leaf {
      position: absolute; color: rgba(255, 255, 255, 0.75); white-space: nowrap;
      text-shadow: 0 0 12px rgba(138, 180, 248, 0.6);
      animation: float-leaf 6s ease-in-out infinite; opacity: 0.9;
    }
    @keyframes float-leaf {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(1.5deg); opacity: 1; }
    }

    /* CESTA A KAMENE */
    .path-container { position: absolute; bottom: 0; left: 0; height: 100%; width: 100%; perspective: 1200px; z-index: 10; }
    .stepping-stone {
      position: absolute; border: none; cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background-image: url('kamenbezpozadia.png');
      background-size: contain; background-repeat: no-repeat; background-position: center;
      background-color: transparent; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; color: rgba(255, 255, 255, 0.9);
      transform-style: preserve-3d; font-weight: bold;
    }
    .stepping-stone:hover {
      transform: translateX(-50%) translateY(-15px) rotateX(40deg) scale(1.18) !important;
      filter: brightness(1.5) drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
    }
    .stone-label { font-size: 0.72rem; color: #ffd700; text-shadow: 0 0 8px rgba(0,0,0,1); text-align: center; line-height: 1.1; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 3000;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-content {
      background: linear-gradient(145deg, #1e293b, #020617);
      border: 1px solid rgba(138, 180, 248, 0.4); border-radius: 24px;
      padding: 35px; width: 92%; max-width: 520px; color: white;
      font-family: 'Quicksand', sans-serif; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      transform: translateY(40px); transition: all 0.4s ease;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-header { font-family: 'Cinzel', serif; font-size: 1.6rem; color: #ffd700; margin-bottom: 8px; text-align: center; }
    .modal-subheader { color: #8ab4f8; font-size: 0.85rem; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
    .section-title { font-weight: 700; color: #ffd700; margin-top: 20px; margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,215,0,0.3); text-transform: uppercase; }
    .info-detail { font-size: 0.98rem; color: #f1f5f9; line-height: 1.5; }
    .bullet-list { margin-top: 8px; padding-left: 20px; }
    .bullet-list li { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 6px; list-style-type: none; position: relative; }
    .bullet-list li::before { content: "✦"; position: absolute; left: -20px; color: #ffd700; font-size: 0.7rem; top: 4px; }
    .close-btn { display: block; width: 100%; margin-top: 30px; background: rgba(255,215,0,0.1); border: 1px solid #ffd700; color: #ffd700; padding: 12px; border-radius: 14px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .close-btn:hover { background: rgba(255,215,0,0.2); }

    /* PÄTIČKA (FOOTER) */
    footer {

    }
    #gdpr-bar button { background: #ffd700; color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

    function generateStones() {
      const container = document.getElementById('pathContainer');
      stoneConfig.forEach((config, index) => {
        const stone = document.createElement('button');
        stone.className = 'stepping-stone';
        stone.style.width = config.size + 'px';
        stone.style.height = (config.size * 0.6) + 'px';
        stone.style.bottom = config.bottom + '%';
        stone.style.left = config.left + '%';
        stone.style.transform = 'translateX(-50%) rotateX(55deg)';
        stone.style.zIndex = 100 - index;
        stone.innerHTML = `<span class="stone-label">${config.label}</span>`;
        
        stone.onclick = () => {
          document.getElementById('modalContent').innerHTML = contentData[config.id] + '<button class="close-btn" onclick="closeModal()">Zavrieť</button>';
          document.getElementById('modalOverlay').classList.add('active');
          // Track click event in Analytics
          gtag('event', 'click_stone', { 'stone_name': config.id });
        };
        container.appendChild(stone);
      });
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    
    // ŠTART
    generateSkills();
    generateStones();
    
    document.getElementById('modalOverlay').onclick = (e) => { 
      if(e.target.id === 'modalOverlay') closeModal(); 
    };
  </script>
